<title>KattaTsumori</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f2faf6;--sf:#ffffff;--sf2:#e8f5ee;
  --bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.14);
  --tx:#2a3d32;--mt:#5a7a67;--ht:#8aab96;
  --ac:#4a8a6e;--ac-bg:rgba(180,224,200,.25);--ac-tx:#2e6b52;
  --gd:#c8a951;--gd-bg:rgba(200,169,81,.1);
  --gn:#4a8a6e;--gn-bg:rgba(180,224,200,.25);--gn-bd:rgba(74,138,110,.3);
  --rd:#c0392b;--rd-bg:rgba(192,57,43,.08);--rd-bd:rgba(192,57,43,.25);
  --or:#d4792a;--or-bg:rgba(212,121,42,.1);
  --r:12px;--rl:16px;
  --nav:62px;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,'Hiragino Sans','Lato',sans-serif;font-size:14px;line-height:1.5;overflow:hidden}
#root{width:100%;max-width:430px;margin:0 auto;height:100%;position:relative}
.app-header{position:absolute;top:0;left:0;right:0;z-index:50;height:50px;background:#B4E0C8;display:flex;align-items:center;justify-content:center;padding-top:var(--st);flex-shrink:0}
.app-header img{height:32px;width:auto;object-fit:contain}
.nav{position:absolute;bottom:0;left:0;right:0;z-index:50;display:flex;background:#4a8a6e;border-top:none;padding-bottom:var(--sb)}
.nb{flex:1;padding:10px 4px 8px;text-align:center;font-size:10px;color:rgba(255,255,255,.6);border:none;background:none;cursor:pointer}
.nb.active{color:#fff}
.view{display:none;position:absolute;top:50px;left:0;right:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 24px}
.view.active{display:block}
.vhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.vtitle{font-size:19px;font-weight:800;color:#2e6b52;letter-spacing:-.01em}
.bal-chip{display:flex;align-items:center;gap:5px;background:rgba(200,169,81,.12);border:1px solid rgba(200,169,81,.3);border-radius:20px;padding:5px 12px}
.bal-lbl{font-size:10px;color:#8b6914;font-weight:600}
.bal-amt{font-size:15px;font-weight:800;color:#8b6914}
.sbar{display:flex;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.step{flex:1;padding:8px 2px;text-align:center;font-size:10px;color:var(--ht);border-right:.5px solid var(--bd);cursor:pointer;line-height:1.4}
.step:last-child{border-right:none}
.step.done{background:var(--sf2);color:var(--mt)}
.step.active{background:#4a8a6e;color:#fff;font-weight:600}
.sec{font-size:11px;font-weight:700;color:#4a8a6e;letter-spacing:.08em;text-transform:uppercase;margin:14px 0 8px}
.sec:first-child{margin-top:0}
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}
.sbtn{padding:12px 6px;border-radius:var(--r);border:.5px solid var(--bd);background:var(--sf);color:var(--tx);font-size:13px;font-weight:600;cursor:pointer;text-align:center;min-height:48px;width:100%}
.sbtn.sel{border:2px solid #4a8a6e;background:rgba(180,224,200,.2);color:#2e6b52}
.mtabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.mtab{padding:7px 10px;border-radius:var(--r);border:.5px solid var(--bd);background:var(--sf2);color:var(--mt);font-size:12px;font-weight:600;cursor:pointer}
.mtab.sel{border-color:#4a8a6e;background:rgba(180,224,200,.2);color:#2e6b52}
.hgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;margin-bottom:10px}
.hbtn{padding:10px 4px;border-radius:var(--r);border:.5px solid var(--bd);background:var(--sf);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;min-height:62px;justify-content:center;position:relative;width:100%}
.hbtn.sn{border:2px solid #4a8a6e;background:rgba(180,224,200,.2)}
.hbtn.sa{border:1.5px solid var(--gd);background:var(--gd-bg)}
.hbtn.sp{border:1.5px solid var(--gn);background:var(--gn-bg)}
.hbtn.s1{border:1.5px solid var(--or);background:var(--or-bg)}
.hbtn.s2{border:1.5px solid var(--ac);background:var(--ac-bg)}
.hbtn.s3{border:1.5px solid var(--gn);background:var(--gn-bg)}
.hbtn.s1.dim,.hbtn.s2.dim,.hbtn.s3.dim{opacity:.3;border-style:dashed}
.excl-toggle-btn{width:100%;padding:10px;border-radius:var(--r);border:1.5px solid var(--or);background:var(--or-bg);color:var(--or);font-size:13px;font-weight:600;cursor:pointer;margin-top:10px}
.excl-panel{background:var(--sf2);border-radius:var(--r);padding:12px;margin-top:8px;border:1px solid var(--bd)}
.excl-hint{font-size:11px;color:var(--mt);margin-bottom:10px;line-height:1.5}
.excl-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.excl-btn{width:40px;height:40px;border-radius:var(--r);border:1px solid var(--bd2);background:var(--sf);color:var(--tx);font-size:13px;font-weight:600;cursor:pointer}
.excl-btn.sel{border-color:var(--or);background:var(--or-bg);color:var(--or)}
.excl-apply-btn{width:100%;padding:11px;border-radius:50px;background:var(--or);color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer}
.week-shortcuts{display:flex;flex-direction:column;gap:8px}
.week-btn{display:flex;align-items:center;gap:12px;width:100%;padding:13px 16px;border-radius:var(--rl);border:1.5px solid var(--bd2);background:var(--sf);cursor:pointer;text-align:left}
.week-btn.sel{border-color:var(--ac);background:var(--ac-bg)}
.week-btn-day{font-size:15px;font-weight:800;color:#3b82f6;width:20px;flex-shrink:0}
.week-btn.sun-btn .week-btn-day{color:var(--rd)}
.week-btn.sel .week-btn-day{color:var(--ac-tx)}
.week-btn-date{font-size:13px;font-weight:600;color:var(--tx)}
.hnum{width:32px;height:32px;border-radius:50%;background:var(--sf2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--tx)}
.hbtn.sn .hnum{background:#4a8a6e;color:#fff}
.hbtn.sa .hnum{background:var(--gd);color:#000}
.hbtn.sp .hnum,.hbtn.s3 .hnum{background:var(--gn);color:#000}
.hbtn.s1 .hnum{background:var(--or);color:#000}
.hbtn.s2 .hnum{background:var(--ac);color:#fff}
.hbr{width:10px;height:10px;border-radius:3px;display:inline-block;border:.5px solid rgba(0,0,0,.2)}
.odot{position:absolute;top:3px;right:3px;width:14px;height:14px;border-radius:50%;background:#e24b4a;color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--mt)}
.leg-dot{width:9px;height:9px;border-radius:50%}
.ptcount{background:var(--sf2);border-radius:var(--r);padding:8px 12px;margin-bottom:10px;font-size:12px;color:var(--mt);display:flex;justify-content:space-between;align-items:center}
.ptcount strong{color:var(--tx);font-size:14px}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}

}

function combs(arr,k){if(k===1)return arr.map(function(x){return[x];});var r=[];arr.forEach(function(x,i){combs(arr.slice(i+1),k-1).forEach(function(c){r.push([x].concat(c));});});return r;}
function perms(arr){if(arr.length<=1)return arr.map(function(x){return[x];});var r=[];arr.forEach(function(x,i){var rest=arr.filter(function(_,j){return j!==i;});perms(rest).forEach(function(p){r.push([x].concat(p));});});return r;}
function genCombos(btId,method,sel){
  var hs=sel.horses||[],ax=sel.axis||[],pt=sel.partner||[],r1=sel.row1||[],r2=sel.row2||[],r3=sel.row3||[];
  if(method==="normal"){
    if(btId==="win"||btId==="place")return hs.map(function(h){return[h];});

      if(hs.length<2)return[];
      var bmap=getBracketMap(S.numHorses);
      var b1=bmap[hs[0]]||BM[hs[0]],b2=bmap[hs[1]]||BM[hs[1]];
      return b1===b2?[]:[[Math.min(b1,b2),Math.max(b1,b2)]];
    }
    if(btId==="quinella"||btId==="wide")return hs.length>=2?[[Math.min(hs[0],hs[1]),Math.max(hs[0],hs[1])]]:[];
    if(btId==="exacta")return hs.length>=2?[hs.slice(0,2)]:[];
    if(btId==="trio")return hs.length>=3?[hs.slice().sort(function(a,b){return a-b;})]:[];
    if(btId==="trifecta")return hs.length>=3?[hs.slice(0,3)]:[];
    return[];
  }
  if(method==="box"){
    if(btId==="bracketQ"){
      var bmap2=getBracketMap(S.numHorses);
      var pairs=combs(hs,2).map(function(c){var b1=bmap2[c[0]]||BM[c[0]],b2=bmap2[c[1]]||BM[c[1]];return b1===b2?null:[Math.min(b1,b2),Math.max(b1,b2)];}).filter(function(x){return x!==null;});
      // 重複除去
      var seen={},uniq=[];pairs.forEach(function(p){var k=p.join("-");if(!seen[k]){seen[k]=1;uniq.push(p);}});return uniq;
    }
    if(btId==="quinella"||btId==="wide")return combs(hs,2).map(function(c){return[Math.min(c[0],c[1]),Math.max(c[0],c[1])];});
    if(btId==="exacta")return perms(hs).filter(function(p){return p.length===2;});
    if(btId==="trio")return combs(hs,3).map(function(c){return c.slice().sort(function(a,b){return a-b;});});
    if(btId==="trifecta")return perms(hs).filter(function(p){return p.length===3;});
    return[];
  }
  if(method==="axis1"||method==="axis1m"){
    if(ax.length===0)return[];
    var a0=ax[0];
    if(method==="axis1"){
      if(btId==="bracketQ"||btId==="quinella"||btId==="wide")return pt.filter(function(p){return p!==a0;}).map(function(p){return[Math.min(a0,p),Math.max(a0,p)];});
      if(btId==="exacta")return pt.filter(function(p){return p!==a0;}).map(function(p){return[a0,p];});
      if(btId==="trio")return combs(pt.filter(function(p){return p!==a0;}),2).map(function(c){return[a0].concat(c).sort(function(a,b){return a-b;});});
      if(btId==="trifecta")return perms(pt.filter(function(p){return p!==a0;})).filter(function(p){return p.length===2;}).map(function(p){return[a0].concat(p);});
    } else {
      if(btId==="exacta")return pt.filter(function(p){return p!==a0;}).reduce(function(acc,p){acc.push([a0,p]);acc.push([p,a0]);return acc;},[]);
      if(btId==="trifecta")return combs(pt.filter(function(p){return p!==a0;}),2).reduce(function(acc,c){perms(c).forEach(function(p){acc.push([a0].concat(p));});return acc;},[]);
    }
    return[];
  }
  if(method==="axis2"){
    if(ax.length<2)return[];
    if(btId==="trio")return pt.filter(function(p){return p!==ax[0]&&p!==ax[1];}).map(function(p){return[ax[0],ax[1],p].sort(function(a,b){return a-b;});});
    if(btId==="trifecta")return pt.filter(function(p){return p!==ax[0]&&p!==ax[1];}).map(function(p){return[ax[0],ax[1],p];});
    return[];
  }
  if(method==="axis2m"){
    if(ax.length<2)return[];
    // 軸2頭が必ず3着以内、相手1頭が残り1枠
    var res=[],seen={};
    var axPerms=[[ax[0],ax[1]],[ax[1],ax[0]]];
    axPerms.forEach(function(pair){
      var a1=pair[0],a2=pair[1];
      pt.filter(function(p){return p!==ax[0]&&p!==ax[1];}).forEach(function(p){
        [[a1,a2,p],[a1,p,a2],[p,a1,a2]].forEach(function(c){
          var k=c.join("-");
          if(!seen[k]){seen[k]=1;res.push(c);}
        });
      });
    });
    return res;
  }
  if(method==="form"){
    var seen={},res=[];
    r1.forEach(function(a){r2.filter(function(b){return b!==a;}).forEach(function(b){r3.filter(function(c){return c!==a&&c!==b;}).forEach(function(c){var combo=btId==="trio"?[a,b,c].sort(function(x,y){return x-y;}):[a,b,c];var key=combo.join("-");if(!seen[key]){seen[key]=1;res.push(combo);}});});});
    return res;
  }
  return[];
}

function judgeCombo(btId,combo,result){
  var f=result.first,s=result.second,t=result.third,a=combo[0],b=combo[1],c=combo[2];
  var bf=BM[f]||0,bs=BM[s]||0;
  if(btId==="win")return a===f;
  if(btId==="place")return a===f||a===s||a===t;
  if(btId==="bracketQ"){
    var jbmap=getBracketMap(S.numHorses);
    var jbf=jbmap[f]||bf,jbs=jbmap[s]||bs;
    return a===Math.min(jbf,jbs)&&b===Math.max(jbf,jbs);
  }
  if(btId==="quinella")return a===Math.min(f,s)&&b===Math.max(f,s);
  if(btId==="wide")return(a===f||a===s||a===t)&&(b===f||b===s||b===t);
  if(btId==="exacta")return a===f&&b===s;
  if(btId==="trio"){var st=[f,s,t].sort(function(x,y){return x-y;});return a===st[0]&&b===st[1]&&c===st[2];}
  if(btId==="trifecta")return a===f&&b===s&&c===t;
  return false;
}

function getHorseCls(n){
  var m=S.method;
  if(m==="normal"||m==="box")return(S.sel.horses||[]).indexOf(n)>=0?"sn":"";
  if(m==="axis1"||m==="axis1m"||m==="axis2"||m==="axis2m"){if((S.sel.axis||[]).indexOf(n)>=0)return"sa";if((S.sel.partner||[]).indexOf(n)>=0)return"sp";return"";}
  if(m==="form"){var i1=(S.sel.row1||[]).indexOf(n)>=0,i2=(S.sel.row2||[]).indexOf(n)>=0,i3=(S.sel.row3||[]).indexOf(n)>=0,ar=S.formRow;if(ar===1&&i1)return"s1";if(ar===2&&i2)return"s2";if(ar===3&&i3)return"s3";if(i1)return"s1 dim";if(i2)return"s2 dim";if(i3)return"s3 dim";return"";}
  return"";
}
function getOrd(n){
  if(S.method==="normal"&&S.betType&&(S.betType.id==="exacta"||S.betType.id==="trifecta")){var idx=(S.sel.horses||[]).indexOf(n);return idx>=0?idx+1:null;}
  return null;
}
function toggleH(n){
  var m=S.method,bt=S.betType;
  if(m==="normal"||m==="box"){if(!S.sel.horses)S.sel.horses=[];var idx=S.sel.horses.indexOf(n);if(idx>=0)S.sel.horses.splice(idx,1);else if(m==="normal"){if(S.sel.horses.length<bt.minSel)S.sel.horses.push(n);else{S.sel.horses.shift();S.sel.horses.push(n);}}else S.sel.horses.push(n);}
  else if(m==="axis1"||m==="axis1m"){if(!S.sel.axis)S.sel.axis=[];if(!S.sel.partner)S.sel.partner=[];if(S.sel.axis.indexOf(n)>=0)S.sel.axis=S.sel.axis.filter(function(x){return x!==n;});else if(S.sel.partner.indexOf(n)>=0)S.sel.partner=S.sel.partner.filter(function(x){return x!==n;});else if(S.sel.axis.length===0)S.sel.axis=[n];else S.sel.partner.push(n);}
  else if(m==="axis2"||m==="axis2m"){if(!S.sel.axis)S.sel.axis=[];if(!S.sel.partner)S.sel.partner=[];if(S.sel.axis.indexOf(n)>=0)S.sel.axis=S.sel.axis.filter(function(x){return x!==n;});else if(S.sel.partner.indexOf(n)>=0)S.sel.partner=S.sel.partner.filter(function(x){return x!==n;});else if(S.sel.axis.length<2)S.sel.axis.push(n);else S.sel.partner.push(n);}
  else if(m==="form"){if(!S.sel.row1)S.sel.row1=[];if(!S.sel.row2)S.sel.row2=[];if(!S.sel.row3)S.sel.row3=[];var rowKey="row"+S.formRow;var rowArr=S.sel[rowKey]||[];var rowIdx=rowArr.indexOf(n);if(rowIdx>=0){S.sel[rowKey]=rowArr.filter(function(x){return x!==n;});}else{S.sel[rowKey]=rowArr.concat([n]);}}

/* 馬券の選択構造を表示するHTML生成 */
function renderSelDisplay(entry){

  if(m==="axis1"||m==="axis1m"){
    var ax=srt(sel.axis).join(", ");
    var pt=srt(sel.partner).join(", ");
    if(ax)lines.push('<div class="sel-line"><span class="sel-role">軸</span><span class="sel-nums">'+ax+'</span></div>');
    if(pt)lines.push('<div class="sel-line"><span class="sel-role">相手</span><span class="sel-nums">'+pt+'</span></div>');
  } else if(m==="axis2"||m==="axis2m"){
    var ax=srt(sel.axis).join(", ");
    var pt=srt(sel.partner).join(", ");
    if(ax)lines.push('<div class="sel-line"><span class="sel-role">軸</span><span class="sel-nums">'+ax+'</span></div>');
    if(pt)lines.push('<div class="sel-line"><span class="sel-role">相手</span><span class="sel-nums">'+pt+'</span></div>');
  } else if(m==="form"){
    var r1=srt(sel.row1).join(", ");
    var r2=srt(sel.row2).join(", ");
    var r3=srt(sel.row3).join(", ");
    if(r1)lines.push('<div class="sel-line"><span class="sel-role">1列目</span><span class="sel-nums">'+r1+'</span></div>');

function judgeByRace(date,raceKey,uid){
  var f=parseInt((ge("r1-"+uid)||{}).value)||0;
  var s=parseInt((ge("r2-"+uid)||{}).value)||0;
  var t=parseInt((ge("r3-"+uid)||{}).value)||0;
  if(!f||!s||!t){showToast("1着〜3着を全て入力してください","e");return;}
  var result={first:f,second:s,third:t};
  // このレースの未判定馬券だけを対象に
  var entries=S.history.filter(function(e){
    return e.date===date&&e.venue+"-"+e.race===raceKey&&e.result===null;
  });
  var hitTypes={};
  entries.forEach(function(e){
    var hits=e.combos.filter(function(c){return judgeCombo(e.betType.id,c,result);});
    e.hitCombos=hits;if(hits.length>0)hitTypes[e.betType.id]=e.betType.label;
  });
  var area=ge("pa-"+uid);if(!area)return;
  if(!Object.keys(hitTypes).length){
    entries.forEach(function(e){e.result="judged";e.payout=0;});
    save();renderHistory();showToast("判定完了 — 的中なし");return;
  }
  area.innerHTML="";
  var ht=ce("p");ht.style.cssText="font-size:12px;color:var(--gn);margin:9px 0 7px;font-weight:600";
  ht.textContent="🎯 的中！払戻額を入力（100円あたり）";area.appendChild(ht);
  var pi=ce("div","payinputs");
  var tids=Object.keys(hitTypes);
  tids.forEach(function(tid){
    var pri=ce("div","pri");pri.appendChild(ce("span","prl",hitTypes[tid]));
    pri.appendChild(ce("span","pry","100円あたり ¥"));
    var prn=document.createElement("input");prn.type="number";prn.className="prn";
    prn.id="pay-"+uid+"-"+tid;prn.min=0;prn.step=10;prn.placeholder="0";prn.inputMode="numeric";
    pri.appendChild(prn);pi.appendChild(pri);
  });
  area.appendChild(pi);
  var cbtn=ce("button","cbtn","✓ 払戻を確定する");
  (function(d,rk,u,ids){cbtn.addEventListener("click",function(){applyPayoutsByRace(d,rk,u,ids);});})(date,raceKey,uid,tids);
  area.appendChild(cbtn);
}

function applyPayoutsByRace(date,raceKey,uid,tids){
  var payouts={},allFilled=true;
  tids.forEach(function(tid){
    var inp=ge("pay-"+uid+"-"+tid);
    if(!inp||inp.value==="")allFilled=false;
    else payouts[tid]=Math.max(0,parseInt(inp.value)||0);
  });
  if(!allFilled){showToast("払戻額を全て入力してください","e");return;}
  var won=0;
  S.history.filter(function(e){return e.date===date&&e.venue+"-"+e.race===raceKey&&e.result===null;}).forEach(function(e){
    e.result="judged";
    if(e.hitCombos.length>0){var up=payouts[e.betType.id]||0;e.payout=e.hitCombos.length*Math.floor(e.unitAmount/100)*up;}
    else e.payout=0;
    won+=e.payout;
  });
  S.balance+=won;save();renderBal();renderHistory();
  showToast(won>0?"払戻 "+fmt(won)+" を記録しました！":"判定完了");
}

/* ── 除外処理 ── */
function showExcludePanel(date, raceKey, uid){
  var area = ge("excl-area-"+uid);
  if(!area) return;
  if(area.innerHTML !== ""){area.innerHTML="";return;} // トグル

  var entries = S.history.filter(function(e){
    return e.date===date && e.venue+"-"+e.race===raceKey;
  });
  var allHorses = new Set();
  entries.forEach(function(e){
    e.combos.forEach(function(c){c.forEach(function(h){allHorses.add(h);});});
  });
  var horses = Array.from(allHorses).sort(function(a,b){return a-b;});

  // 現在の除外馬（エントリ間で共通のものを取得）
  var currentExcluded = entries.length > 0 ? (entries[0].excluded||[]).slice() : [];

  var html = '<div class="excl-panel">';
  html += '<p class="excl-hint">除外になった馬番を選択してください。除外馬を含む組み合わせは返還されます。</p>';
  html += '<div class="excl-grid">';
  horses.forEach(function(h){
    var isSel = currentExcluded.indexOf(h) >= 0;
    html += '<button class="excl-btn'+(isSel?" sel":"")+'" data-horse="'+h+'">'+h+'</button>';
  });
  html += '</div>';
  html += '<button class="excl-apply-btn" id="excl-apply-'+uid+'">除外処理を適用</button>';
  html += '</div>';
  area.innerHTML = html;

  // 馬番ボタンのトグル
  area.querySelectorAll('.excl-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      btn.classList.toggle('sel');
    });
  });

  // 適用ボタン
  var applyBtn = ge("excl-apply-"+uid);
  if(applyBtn){
    (function(d, rk, u){
      applyBtn.addEventListener('click', function(){
        var selBtns = area.querySelectorAll('.excl-btn.sel');
        var excluded = [];
        selBtns.forEach(function(b){ excluded.push(parseInt(b.getAttribute('data-horse'))); });
        applyExclude(d, rk, excluded);
      });
    })(date, raceKey, uid);
  }
}

function isBracketQValid(combo, excluded, numHorses){
  // 枠連の組み合わせ[b1,b2]が除外後も成立するか判定
  var bmap = getBracketMap(numHorses);
  var b1 = combo[0], b2 = combo[1];
  // 各枠に何頭残っているか数える
  var remaining = {};
  for(var h=1; h<=numHorses; h++){
    var br = bmap[h];
    if(!remaining[br]) remaining[br] = 0;
    if(excluded.indexOf(h) < 0) remaining[br]++;
  }
  if(b1 === b2){
    // 同枠: 枠内に2頭以上残っている必要がある
    return (remaining[b1] || 0) >= 2;
  } else {
    // 異枠: 両枠にそれぞれ1頭以上残っている必要がある
    return (remaining[b1] || 0) >= 1 && (remaining[b2] || 0) >= 1;
  }
}

function applyExclude(date, raceKey, excluded){
  var entries = S.history.filter(function(e){
    return e.date===date && e.venue+"-"+e.race===raceKey;
  });
  var totalRefund = 0;
  entries.forEach(function(e){
    e.excluded = excluded;
    if(excluded.length === 0){
      // 除外解除：返還額をリセット
      S.balance -= (e.refund || 0);
      e.refund = 0;
      e.combos = genCombos(e.betType.id, e.method.id, e.sel);
      e.totalAmount = e.unitAmount * e.combos.length;
    } else {
      var originalCombos = genCombos(e.betType.id, e.method.id, e.sel);
      var validCombos;
      if(e.betType.id === "bracketQ"){
        // 枠連専用判定：枠単位で成立するか確認
        var nh = e.numHorses || 18;
        validCombos = originalCombos.filter(function(c){
          return isBracketQValid(c, excluded, nh);
        });
      } else {
        // その他：除外馬を含む組み合わせを除く
        validCombos = originalCombos.filter(function(c){
          return !c.some(function(h){ return excluded.indexOf(h) >= 0; });
        });
      }
      var excludedCount = originalCombos.length - validCombos.length;
      var newRefund = excludedCount * e.unitAmount;
      S.balance -= (e.refund || 0);
      e.refund = newRefund;
      S.balance += newRefund;
      totalRefund += newRefund;
      e.combos = validCombos;
      e.totalAmount = e.unitAmount * validCombos.length;
    }
  });
  save(); renderBal(); renderHistory();
  if(excluded.length === 0){
    showToast("除外を解除しました");
  } else {
    showToast(excluded.join(",")+"番除外 → 返還 "+fmt(totalRefund));
  }
}

function initSettings(){
  var bqWrap=ge("bal-quick");
  BAL_QUICK.forEach(function(v){
    var b=ce("button","bqb");b.textContent=fmt(v);
    b.addEventListener("click",function(){S.balance=v;save();renderBal();showToast(fmt(v)+"に設定しました");});
    bqWrap.appendChild(b);
  });
  ge("bal-set-btn").addEventListener("click",function(){
    var v=parseInt(ge("bal-inp").value)||0;S.balance=Math.max(0,v);ge("bal-inp").value="";save();renderBal();showToast(fmt(S.balance)+"に設定しました");
  });
  ge("reset-btn").addEventListener("click",function(){
    if(!confirm("全履歴を削除して残高を¥10,000にリセットしますか？"))return;
    S.history=[];S.balance=10000;save();renderBal();showToast("リセットしました");
  });
}
